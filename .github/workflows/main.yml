name: Node Matrix Example

on:
  push:
  workflow_dispatch: 

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:
      - name: Generate matrix
        id: generate
        run: |
          json='{"include":['
          first=true

          for i in $(seq 1 100); do
            if [ "$first" = true ]; then
              first=false
            else
              json+=","
            fi

            json+="{\"job_number\":$i}"
          done

          json+="]}"
          echo "matrix=$json" >> $GITHUB_OUTPUT

  run:
    needs: prepare

    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ubuntu-latest

    steps:
      - name: Print job number
        run: echo "Running job ${{ matrix.job_number }}"
