name: Node Matrix Example

on:
  push:
  workflow_dispatch: 

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      jobs: ${{ steps.generate.outputs.jobs }}

    steps:
      - name: Generate matrix
        id: generate
        run: |
          echo 'jobs=[ { "Name": "A" }, { "Name" : "B" }]' >> $GITHUB_OUTPUT

  run:
    needs: prepare

    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.jobs) }}

    runs-on: ubuntu-latest

    steps:
      - name: Print job number
        run: echo "Running job ${{ matrix.Name }}"
