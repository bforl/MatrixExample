name: Node Matrix Example

on:
  push:
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        version: [16, 18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: print version
        run: |
          echo "Node version: ${{ matrix.version }}"
        
