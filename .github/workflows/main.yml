name: Node Matrix Example

on:
  push:
  workflow_dispatch: 

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:
      - name: Generate matrix with loops
        id: generate
        run: |
          json='{"include":['
          first=true

          for os in ubuntu-latest windows-latest; do
            for node in 18 20; do
              if [ "$first" = true ]; then
                first=false
              else
                json+=","
              fi

              json+="{\"os\":\"$os\",\"node\":$node}"
            done
          done

          json+="]}"
          echo "matrix=$json" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Print matrix state
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Node: ${{ matrix.node }}"
